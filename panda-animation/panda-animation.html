<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Walking Animation Practice Assignment</title>
    <style>
        *{
            margin:0;
            padding: 0;
        }
        .road{
            border-bottom: 7px dashed black;
        }
        .walkPanda{
            background: url(panda_colour.png);
            width: 250px;
            height: 330px;
            /* animations */
            animation-name: panda, walk;
            animation-duration: 1s, 5s;
            animation-timing-function: steps(12), linear;
            animation-iteration-count: infinite, infinite;
        }
        @keyframes panda{ /* move through all 12 frames of the background image*/
            0%{
                background-position: 0px;
            }
            100%{
                background-position: 3000px;
            }
        }
        @keyframes walk {
            0%{
                transform: translateX(-100px);
            }
            100%{
                transform:translateX(1200px);
            }
        }


    </style>
</head>
<body>
    <div class="walkPanda"></div>
    <div class="road"></div>
    
</body>
</html>
